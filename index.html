<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool Tạo Tem Quân Sự (Bản Chuẩn Xuất PDF)</title>

    <style>
        /* ========================================= */
        /* 1. KHAI BÁO FONT & BIẾN MÀU GIAO DIỆN     */
        /* ========================================= */
        @font-face {
            font-family: 'UTM HelvetIns';
            src: url('UTM HelvetIns.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #1d4ed8;
            --primary-hover: #1e40af;
            --success: #15803d;
            --success-hover: #166534;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --border: #cbd5e1;
            --radius: 8px;
        }

        /* ========================================= */
        /* 2. GIAO DIỆN RESPONSIVE (PC & MOBILE)     */
        /* ========================================= */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h2 { margin: 0; font-size: 20px; }

        .section { padding: 20px; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            font-family: monospace;
            min-height: 100px;
        }

        /* Bảng Nâng Cao */
        .advanced-panel {
            display: none;
            background-color: #f1f5f9;
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .advanced-panel.active { display: block; }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-row > div { flex: 1; }
        .input-row .narrow { flex: 0 0 80px; }

        .actions {
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap; /* Tự xuống dòng trên Mobile */
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            min-width: 200px;
        }

        .btn-toggle {
            background: transparent;
            color: var(--primary);
            border: 1px dashed var(--primary);
            margin-top: 5px;
            padding: 8px;
            font-size: 13px;
            width: 100%;
            min-width: auto;
        }

        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }

        /* Khung Preview có thể cuộn ngang trên Mobile */
        .preview-wrapper {
            width: 100%;
            max-width: 297mm;
            overflow-x: auto;
            background: #e2e8f0;
            padding: 10px;
            border-radius: var(--radius);
        }

        /* CSS cho thiết bị nhỏ (Mobile) */
        @media (max-width: 600px) {
            .input-row { flex-direction: column; align-items: stretch; }
            .input-row .narrow { flex: auto; }
            button { width: 100%; }
        }

        /* ========================================= */
        /* 3. CẤU HÌNH TRANG IN (KHÓA CỨNG A4 NGANG) */
        /* ========================================= */
        @page {
            size: A4 landscape;
            margin: 0;
        }

        #printArea {
            width: 297mm;
            min-height: 210mm;
            background: #fff;
            margin: 0 auto;
            padding: 10mm 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========================================= */
        /* 4. KỸ THUẬT RENDER TEM (TUYỆT ĐỐI CHÍNH XÁC) */
        /* ========================================= */
        .tag-pair {
            display: flex;
            gap: 10mm;
            margin-bottom: 5mm;
            page-break-inside: avoid;
        }

        .tag-ellipse {
            /* Khóa cứng kích thước 100x50mm, chống méo */
            width: 100mm;
            height: 50mm;
            min-width: 100mm;
            max-width: 100mm;
            min-height: 50mm;
            max-height: 50mm;
            flex-shrink: 0; 
            
            background-color: #27318b;
            border-radius: 50% / 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .tag-ellipse::before {
            content: '';
            position: absolute;
            top: 3mm; bottom: 3mm; left: 3mm; right: 3mm;
            border: 0.5mm solid #ffffff;
            border-radius: 50% / 50%;
            pointer-events: none;
        }

        .text-common {
            color: #ffffff !important;
            font-family: 'UTM HelvetIns', Arial, sans-serif;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            transform-origin: center;
            z-index: 1;
        }

        .org-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            width: 100%;
        }

        /* ========================================= */
        /* 5. LOẠI BỎ UI KHI XUẤT PDF                */
        /* ========================================= */
        @media print {
            body { background: none; padding: 0; }
            .controls-container, .preview-wrapper { 
                display: none; 
                padding: 0; 
                margin: 0; 
                background: none; 
            }
            #printArea {
                /* Đảm bảo khung in đẩy sát lề giấy */
                position: absolute;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <div class="header">
            <h2>Hệ thống In Tem Quân Sự</h2>
        </div>

        <div class="section">
            <div class="form-group">
                <label>Nhập Tên / Chức vụ (Mỗi người 1 dòng):</label>
                <textarea id="nameInput">NGUYỄN VĂN A
TRẦN THỊ B</textarea>
            </div>
            <button class="btn-toggle" onclick="toggleAdvanced()">+ Tùy chỉnh Nâng cao (Kích thước, Khoảng cách)</button>
        </div>

        <div class="advanced-panel" id="advancedPanel">
            <div class="form-group">
                <label>Dòng Cơ quan (Trên):</label>
                <div class="input-row">
                    <input type="text" id="orgTopText" value="HỌC VIỆN KỸ THUẬT QUÂN SỰ">
                    <div class="narrow">
                        <small>Co %</small>
                        <input type="number" id="orgTopScale" value="75">
                    </div>
                    <div class="narrow">
                        <small>Cao(mm)</small>
                        <input type="number" id="orgTopSize" value="8">
                    </div>
                    <div class="narrow">
                        <small>Cách dưới</small>
                        <input type="number" id="orgGap" value="6" step="0.5">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Dòng Đơn vị (Dưới):</label>
                <div class="input-row">
                    <input type="text" id="orgBotText" value="TIỂU ĐOÀN 4">
                    <div class="narrow">
                        <small>Co %</small>
                        <input type="number" id="orgBotScale" value="75">
                    </div>
                    <div class="narrow">
                        <small>Cao(mm)</small>
                        <input type="number" id="orgBotSize" value="10">
                    </div>
                    <div class="narrow"></div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">
                <label>Tem Tên (Bên phải):</label>
                <div class="input-row">
                    <div></div>
                    <div class="narrow">
                        <small>Co %</small>
                        <input type="number" id="nameScale" value="75">
                    </div>
                    <div class="narrow">
                        <small>Cao(mm)</small>
                        <input type="number" id="nameSize" value="12">
                    </div>
                    <div class="narrow"></div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="generateTags()">1. Lên Khuôn</button>
            <button class="btn-success" onclick="window.print()">2. Xuất PDF</button>
        </div>
    </div>

    <div class="preview-wrapper">
        <div id="printArea"></div>
    </div>

    <script>
        function toggleAdvanced() {
            document.getElementById('advancedPanel').classList.toggle('active');
        }

        function generateTags() {
            const namesRaw = document.getElementById('nameInput').value;
            const names = namesRaw.split('\n').map(n => n.trim()).filter(n => n !== '');

            const topText = document.getElementById('orgTopText').value;
            const topScale = (document.getElementById('orgTopScale').value || 75) / 100;
            const topSize = document.getElementById('orgTopSize').value || 8;
            const orgGap = document.getElementById('orgGap').value || 6;

            const botText = document.getElementById('orgBotText').value;
            const botScale = (document.getElementById('orgBotScale').value || 75) / 100;
            const botSize = document.getElementById('orgBotSize').value || 10;

            const nameScale = (document.getElementById('nameScale').value || 75) / 100;
            const nameSize = document.getElementById('nameSize').value || 12;

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; 

            if (names.length === 0) {
                alert('Dữ liệu trống. Vui lòng nhập tên.');
                return;
            }

            names.forEach(name => {
                const pairWrapper = document.createElement('div');
                pairWrapper.className = 'tag-pair';

                // TEM TRÁI (CƠ QUAN)
                const orgEllipse = document.createElement('div');
                orgEllipse.className = 'tag-ellipse';
                const orgTextContainer = document.createElement('div');
                orgTextContainer.className = 'org-container';
                
                const spanTop = document.createElement('div');
                spanTop.className = 'text-common';
                spanTop.innerText = topText;
                spanTop.style.transform = `scaleX(${topScale})`;
                spanTop.style.fontSize = `${topSize}mm`;
                spanTop.style.lineHeight = `${topSize}mm`;
                spanTop.style.marginBottom = `${orgGap}mm`; 
                
                const spanBot = document.createElement('div');
                spanBot.className = 'text-common';
                spanBot.innerText = botText;
                spanBot.style.transform = `scaleX(${botScale})`;
                spanBot.style.fontSize = `${botSize}mm`;
                spanBot.style.lineHeight = `${botSize}mm`;

                orgTextContainer.appendChild(spanTop);
                orgTextContainer.appendChild(spanBot);
                orgEllipse.appendChild(orgTextContainer);

                // TEM PHẢI (TÊN)
                const nameEllipse = document.createElement('div');
                nameEllipse.className = 'tag-ellipse';
                
                const nameText = document.createElement('div');
                nameText.className = 'text-common';
                nameText.innerText = name;
                nameText.style.transform = `scaleX(${nameScale})`;
                nameText.style.fontSize = `${nameSize}mm`;
                nameText.style.lineHeight = `${nameSize}mm`;
                
                nameEllipse.appendChild(nameText);

                // LẮP RÁP
                pairWrapper.appendChild(orgEllipse);
                pairWrapper.appendChild(nameEllipse);
                printArea.appendChild(pairWrapper);
            });
        }

        generateTags();
    </script>
</body>
</html>
