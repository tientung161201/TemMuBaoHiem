<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Tạo Tem Quân Sự (Lưu PDF Trực Tiếp)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* ========================================= */
        /* 1. KHAI BÁO FONT & CSS CƠ BẢN             */
        /* ========================================= */
        @font-face {
            font-family: 'UTM HelvetIns';
            src: url('UTM HelvetIns.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #1d4ed8;
            --success: #15803d;
            --bg-color: #f8fafc;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-container {
            background: #fff;
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h2 { margin: 0; font-size: 20px; }
        .section { padding: 20px; }
        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        
        textarea { resize: vertical; min-height: 100px; font-family: monospace; }

        /* Bảng nâng cao */
        .advanced-panel {
            display: none;
            background: #f1f5f9;
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .advanced-panel.active { display: block; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-row > div { flex: 1; }
        .input-row .narrow { flex: 0 0 80px; }

        .actions {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            border-top: 1px solid var(--border);
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            min-width: 200px;
        }
        
        .btn-toggle {
            background: transparent;
            color: var(--primary);
            border: 1px dashed var(--primary);
            width: 100%;
            padding: 8px;
        }

        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }

        /* ========================================= */
        /* 2. KHUNG IN & THIẾT KẾ TEM                */
        /* ========================================= */
        .preview-wrapper {
            width: 100%;
            max-width: 297mm;
            overflow-x: auto;
            background: #e2e8f0;
            padding: 10px;
            border-radius: 8px;
        }

        /* Khung in A4 ngang chuẩn */
        #printArea {
            width: 297mm;
            min-height: 210mm;
            background: #fff;
            margin: 0 auto;
            padding: 10mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tag-pair {
            display: flex;
            gap: 10mm;
            margin-bottom: 5mm;
        }

        .tag-ellipse {
            width: 100mm;
            height: 50mm;
            background-color: #27318b;
            border-radius: 50% / 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .tag-ellipse::before {
            content: '';
            position: absolute;
            top: 3mm; bottom: 3mm; left: 3mm; right: 3mm;
            border: 0.5mm solid #ffffff;
            border-radius: 50% / 50%;
            pointer-events: none;
        }

        .text-common {
            color: #ffffff !important;
            font-family: 'UTM HelvetIns', Arial, sans-serif;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            transform-origin: center;
            z-index: 1;
        }

        .org-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <div class="header">
            <h2>Hệ thống In Tem Quân Sự</h2>
        </div>

        <div class="section">
            <div class="form-group">
                <label>Nhập Tên / Chức vụ (Mỗi người 1 dòng):</label>
                <textarea id="nameInput">NGUYỄN VĂN A
TRẦN THỊ B</textarea>
            </div>
            <button class="btn-toggle" onclick="toggleAdvanced()">+ Tùy chỉnh Nâng cao</button>
        </div>

        <div class="advanced-panel" id="advancedPanel">
            <div class="form-group">
                <label>Dòng Cơ quan (Trên):</label>
                <div class="input-row">
                    <input type="text" id="orgTopText" value="HỌC VIỆN KỸ THUẬT QUÂN SỰ">
                    <div class="narrow"><small>Co %</small><input type="number" id="orgTopScale" value="75"></div>
                    <div class="narrow"><small>Cao(mm)</small><input type="number" id="orgTopSize" value="8"></div>
                    <div class="narrow"><small>Cách dưới</small><input type="number" id="orgGap" value="6" step="0.5"></div>
                </div>
            </div>
            <div class="form-group">
                <label>Dòng Đơn vị (Dưới):</label>
                <div class="input-row">
                    <input type="text" id="orgBotText" value="TIỂU ĐOÀN 4">
                    <div class="narrow"><small>Co %</small><input type="number" id="orgBotScale" value="75"></div>
                    <div class="narrow"><small>Cao(mm)</small><input type="number" id="orgBotSize" value="10"></div>
                    <div class="narrow"></div>
                </div>
            </div>
            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">
                <label>Tem Tên (Bên phải):</label>
                <div class="input-row">
                    <div></div>
                    <div class="narrow"><small>Co %</small><input type="number" id="nameScale" value="75"></div>
                    <div class="narrow"><small>Cao(mm)</small><input type="number" id="nameSize" value="12"></div>
                    <div class="narrow"></div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="generateTags()">1. Lên Khuôn</button>
            <button class="btn-success" id="downloadBtn" onclick="downloadPDF()">2. Lưu file PDF trực tiếp</button>
        </div>
    </div>

    <div class="preview-wrapper">
        <div id="printArea"></div>
    </div>

    <script>
        function toggleAdvanced() {
            document.getElementById('advancedPanel').classList.toggle('active');
        }

        function generateTags() {
            const namesRaw = document.getElementById('nameInput').value;
            const names = namesRaw.split('\n').map(n => n.trim()).filter(n => n !== '');

            const topText = document.getElementById('orgTopText').value;
            const topScale = (document.getElementById('orgTopScale').value || 75) / 100;
            const topSize = document.getElementById('orgTopSize').value || 8;
            const orgGap = document.getElementById('orgGap').value || 6;

            const botText = document.getElementById('orgBotText').value;
            const botScale = (document.getElementById('orgBotScale').value || 75) / 100;
            const botSize = document.getElementById('orgBotSize').value || 10;

            const nameScale = (document.getElementById('nameScale').value || 75) / 100;
            const nameSize = document.getElementById('nameSize').value || 12;

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; 

            if (names.length === 0) return;

            names.forEach(name => {
                const pairWrapper = document.createElement('div');
                pairWrapper.className = 'tag-pair';

                // TEM TRÁI (CƠ QUAN)
                const orgEllipse = document.createElement('div');
                orgEllipse.className = 'tag-ellipse';
                const orgTextContainer = document.createElement('div');
                orgTextContainer.className = 'org-container';
                
                const spanTop = document.createElement('div');
                spanTop.className = 'text-common';
                spanTop.innerText = topText;
                spanTop.style.transform = `scaleX(${topScale})`;
                spanTop.style.fontSize = `${topSize}mm`;
                spanTop.style.lineHeight = `${topSize}mm`;
                spanTop.style.marginBottom = `${orgGap}mm`; 
                
                const spanBot = document.createElement('div');
                spanBot.className = 'text-common';
                spanBot.innerText = botText;
                spanBot.style.transform = `scaleX(${botScale})`;
                spanBot.style.fontSize = `${botSize}mm`;
                spanBot.style.lineHeight = `${botSize}mm`;

                orgTextContainer.appendChild(spanTop);
                orgTextContainer.appendChild(spanBot);
                orgEllipse.appendChild(orgTextContainer);

                // TEM PHẢI (TÊN)
                const nameEllipse = document.createElement('div');
                nameEllipse.className = 'tag-ellipse';
                
                const nameText = document.createElement('div');
                nameText.className = 'text-common';
                nameText.innerText = name;
                nameText.style.transform = `scaleX(${nameScale})`;
                nameText.style.fontSize = `${nameSize}mm`;
                nameText.style.lineHeight = `${nameSize}mm`;
                
                nameEllipse.appendChild(nameText);

                // LẮP RÁP
                pairWrapper.appendChild(orgEllipse);
                pairWrapper.appendChild(nameEllipse);
                printArea.appendChild(pairWrapper);
            });
        }

        // Script xuất PDF tự động dùng html2pdf.js
        function downloadPDF() {
            const element = document.getElementById('printArea');
            const btn = document.getElementById('downloadBtn');
            
            // Đổi trạng thái nút bấm
            btn.innerText = "Đang xử lý...";
            btn.disabled = true;

            // Cấu hình thông số xuất file
            const opt = {
                margin:       0,
                filename:     'Tem_Quan_Su.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true }, // scale: 2 giúp ảnh nét hơn
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            // Gọi lệnh lưu và khôi phục nút bấm
            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = "2. Lưu file PDF trực tiếp";
                btn.disabled = false;
            });
        }

        generateTags();
    </script>
</body>
</html>
