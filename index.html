<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool Tạo Tem Quân Sự (Vector PDF Siêu Nét)</title>

    <style>
        /* ========================================= */
        /* 1. KHAI BÁO FONT & CSS BIẾN               */
        /* ========================================= */
        @font-face {
            font-family: 'UTM HelvetIns';
            src: url('UTM HelvetIns.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #1d4ed8;
            --success: #15803d;
            --bg-color: #f1f5f9;
            --border: #cbd5e1;
        }

        /* ========================================= */
        /* 2. GIAO DIỆN RESPONSIVE CHO ĐIỆN THOẠI    */
        /* ========================================= */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-container {
            background: #fff;
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h2 { margin: 0; font-size: 20px; }
        .section { padding: 20px; }
        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #334155;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            -webkit-appearance: none; 
        }
        
        textarea { resize: vertical; min-height: 120px; font-family: monospace; }

        .advanced-panel {
            display: none;
            background: #f8fafc;
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .advanced-panel.active { display: block; }
        
        .input-row { display: flex; gap: 12px; align-items: flex-end; }
        .input-row > div { flex: 1; }
        .input-row .narrow { flex: 0 0 85px; }
        .input-row small { display: block; margin-bottom: 4px; font-size: 12px; color: #64748b; }

        .actions {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            border-top: 1px solid var(--border);
            background: #fff;
            flex-wrap: wrap; 
        }

        button {
            padding: 14px 24px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            min-width: 200px;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        
        .btn-toggle {
            background: #f1f5f9;
            color: var(--primary);
            border: 1px solid var(--border);
            width: 100%;
            padding: 12px;
            margin-top: 5px;
        }

        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .note { text-align: center; font-size: 13px; color: #d97706; margin-top: 10px; width: 100%; font-weight: bold;}

        @media (max-width: 600px) {
            body { padding: 0; }
            .controls-container { border-radius: 0; margin-bottom: 10px; }
            .input-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .input-row .narrow { flex: auto; }
            button { width: 100%; }
        }

        /* ========================================= */
        /* 3. KHUNG IN TỰ ĐỘNG PHÂN TRANG A4         */
        /* ========================================= */
        .preview-wrapper {
            width: 100%;
            max-width: 297mm;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        #printArea {
            display: flex;
            flex-direction: column;
            gap: 10mm; /* Khoảng cách giữa các trang A4 khi preview */
        }

        /* Định dạng 1 trang giấy A4 Ngang */
        .a4-page {
            width: 297mm;
            height: 210mm; /* Kích thước tuyệt đối của A4 ngang */
            background: #fff;
            padding: 15mm 0; /* Lề trên/dưới an toàn 1.5cm */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            page-break-after: always; /* Tự động ngắt trang khi in */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Đổ bóng cho dễ nhìn trên web */
        }

        .a4-page:last-child {
            page-break-after: auto;
        }

        .tag-pair {
            display: flex;
            gap: 10mm; /* Khoảng cách giữa tem trái và phải */
            margin-bottom: 8mm; /* Khoảng cách hàng trên và hàng dưới */
            page-break-inside: avoid;
        }

        .tag-ellipse {
            width: 100mm;
            height: 50mm;
            min-width: 100mm;
            max-width: 100mm;
            min-height: 50mm;
            max-height: 50mm;
            background-color: #27318b;
            border-radius: 50% / 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .tag-ellipse::before {
            content: '';
            position: absolute;
            top: 3mm; bottom: 3mm; left: 3mm; right: 3mm;
            border: 0.5mm solid #ffffff;
            border-radius: 50% / 50%;
            pointer-events: none;
        }

        .text-common {
            color: #ffffff !important;
            font-family: 'UTM HelvetIns', Arial, sans-serif;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            transform-origin: center;
            z-index: 1;
        }

        .org-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 1;
        }

        /* ========================================= */
        /* 4. CHẾ ĐỘ XUẤT LỆNH IN                    */
        /* ========================================= */
        @page {
            size: A4 landscape;
            margin: 0;
        }

        @media print {
            body { background: none; padding: 0; margin: 0; }
            .controls-container { display: none; }
            .preview-wrapper { 
                background: none; 
                padding: 0; 
                max-width: none; 
                overflow: visible; 
            }
            .a4-page {
                box-shadow: none; /* Xóa bóng đổ khi in */
                margin: 0;
            }
            #printArea {
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <div class="header">
            <h2>Hệ thống In Tem Quân Sự Vector</h2>
        </div>

        <div class="section">
            <div class="form-group">
                <label>Nhập Tên / Chức vụ (Mỗi người 1 dòng):</label>
                <textarea id="nameInput">NGUYỄN VĂN A
TRẦN THỊ B
PHẠM VĂN C
LÊ THỊ D
HOÀNG VĂN E
ĐINH THỊ F
VŨ VĂN G</textarea>
            </div>
            <button class="btn-toggle" onclick="toggleAdvanced()">⚙ Tùy chỉnh Nâng cao</button>
        </div>

        <div class="advanced-panel" id="advancedPanel">
            <div class="form-group">
                <label>Tem Cơ quan - Dòng trên:</label>
                <div class="input-row">
                    <div>
                        <small>Nội dung chữ</small>
                        <input type="text" id="orgTopText" value="HỌC VIỆN KỸ THUẬT QUÂN SỰ">
                    </div>
                    <div class="narrow"><small>Co (%)</small><input type="number" id="orgTopScale" value="75"></div>
                    <div class="narrow"><small>Cao (mm)</small><input type="number" id="orgTopSize" value="8"></div>
                    <div class="narrow"><small>Cách dưới</small><input type="number" id="orgGap" value="4" step="0.5"></div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Tem Cơ quan - Dòng dưới:</label>
                <div class="input-row">
                    <div>
                        <small>Nội dung chữ</small>
                        <input type="text" id="orgBotText" value="TIỂU ĐOÀN 4">
                    </div>
                    <div class="narrow"><small>Co (%)</small><input type="number" id="orgBotScale" value="75"></div>
                    <div class="narrow"><small>Cao (mm)</small><input type="number" id="orgBotSize" value="10"></div>
                    <div class="narrow"></div>
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 20px;">
                <label>Tem Tên (Bên phải):</label>
                <div class="input-row">
                    <div></div>
                    <div class="narrow"><small>Co (%)</small><input type="number" id="nameScale" value="75"></div>
                    <div class="narrow"><small>Cao (mm)</small><input type="number" id="nameSize" value="12"></div>
                    <div class="narrow"></div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="generateTags()">1. Lên Khuôn & Xem Trước</button>
            <button class="btn-success" onclick="window.print()">2. Xuất PDF Vector (Siêu nét)</button>
            <div class="note">Mẹo: Bấm nút "Xuất PDF", tại mục Máy in (Destination) chọn "Lưu dưới dạng PDF" (Save as PDF)</div>
        </div>
    </div>

    <div class="preview-wrapper">
        <div id="printArea"></div>
    </div>

    <script>
        function toggleAdvanced() {
            document.getElementById('advancedPanel').classList.toggle('active');
        }

        function generateTags() {
            const namesRaw = document.getElementById('nameInput').value;
            const names = namesRaw.split('\n').map(n => n.trim()).filter(n => n !== '');

            const topText = document.getElementById('orgTopText').value;
            const topScale = (document.getElementById('orgTopScale').value || 75) / 100;
            const topSize = document.getElementById('orgTopSize').value || 8;
            const orgGap = document.getElementById('orgGap').value || 4;

            const botText = document.getElementById('orgBotText').value;
            const botScale = (document.getElementById('orgBotScale').value || 75) / 100;
            const botSize = document.getElementById('orgBotSize').value || 10;

            const nameScale = (document.getElementById('nameScale').value || 75) / 100;
            const nameSize = document.getElementById('nameSize').value || 12;

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; 

            if (names.length === 0) return;

            // Thuật toán phân trang: 3 hàng (3 cặp) trên 1 trang A4
            const PAIRS_PER_PAGE = 3;
            
            for (let i = 0; i < names.length; i += PAIRS_PER_PAGE) {
                // Tạo một trang A4
                const pageDiv = document.createElement('div');
                pageDiv.className = 'a4-page';
                
                // Lấy danh sách tên cho trang hiện tại
                const pageNames = names.slice(i, i + PAIRS_PER_PAGE);

                pageNames.forEach(name => {
                    const pairWrapper = document.createElement('div');
                    pairWrapper.className = 'tag-pair';

                    // ==========================================
                    // TEM TRÁI (CƠ QUAN)
                    // ==========================================
                    const orgEllipse = document.createElement('div');
                    orgEllipse.className = 'tag-ellipse';
                    const orgTextContainer = document.createElement('div');
                    orgTextContainer.className = 'org-container';
                    
                    const spanTop = document.createElement('div');
                    spanTop.className = 'text-common';
                    spanTop.innerText = topText;
                    spanTop.style.transform = `scaleX(${topScale})`;
                    spanTop.style.fontSize = `${topSize}mm`;
                    spanTop.style.lineHeight = `${topSize}mm`;
                    spanTop.style.marginBottom = `${orgGap}mm`; 
                    
                    const spanBot = document.createElement('div');
                    spanBot.className = 'text-common';
                    spanBot.innerText = botText;
                    spanBot.style.transform = `scaleX(${botScale})`;
                    spanBot.style.fontSize = `${botSize}mm`;
                    spanBot.style.lineHeight = `${botSize}mm`;

                    orgTextContainer.appendChild(spanTop);
                    orgTextContainer.appendChild(spanBot);
                    orgEllipse.appendChild(orgTextContainer);

                    // ==========================================
                    // TEM PHẢI (TÊN)
                    // ==========================================
                    const nameEllipse = document.createElement('div');
                    nameEllipse.className = 'tag-ellipse';
                    
                    const nameText = document.createElement('div');
                    nameText.className = 'text-common';
                    nameText.innerText = name;
                    nameText.style.transform = `scaleX(${nameScale})`;
                    nameText.style.fontSize = `${nameSize}mm`;
                    nameText.style.lineHeight = `${nameSize}mm`;
                    
                    nameEllipse.appendChild(nameText);

                    // Gắn vào cặp
                    pairWrapper.appendChild(orgEllipse);
                    pairWrapper.appendChild(nameEllipse);
                    
                    // Gắn cặp vào Trang A4
                    pageDiv.appendChild(pairWrapper);
                });

                // Đẩy trang A4 ra vùng in
                printArea.appendChild(pageDiv);
            }
        }

        // Khởi tạo mặc định
        generateTags();
    </script>
</body>
</html>
